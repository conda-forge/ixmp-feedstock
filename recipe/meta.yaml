{% set name = "ixmp" %}
{% set version = "3.11.0" %}
{% set hash = "4acc853940b863e3134aa545c0c2ea15782832001052accfce3f3b3262c0ea60" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ hash }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - ixmp = ixmp.cli:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools-scm
    - setuptools

  run:
    # Per requires-python in pyproject.toml
    # The value is set in .ci_support/linux_64_.yaml
    - python >={{ python_min }}
    # Mandatory dependencies per pyproject.toml
    - click
    - genno >=1.20.0
    - jpype1 >=1.2.1
    - openjdk
    - openpyxl
    - pandas >=1.2
    - pint
    - PyYAML
    - xarray
    # Optional dependencies from the "ixmp4" set
    # - ixmp4 >=0.10, <=0.11  # python_min == 3.9 only satisfied by ixmp4 0.4.0
    # - gamsapi               # Not packaged for conda as of 2025-05-27

test:
  requires:
    - python {{ python_min }}
  imports:
    - ixmp
  commands:
    - ixmp --help
    - ixmp show-versions

about:
  home: https://github.com/iiasa/ixmp
  license: Apache-2.0
  license_file: LICENSE
  summary: |
    The ix modeling platform for integrated and cross-cutting scenario analysis

extra:
  recipe-maintainers:
    - danielhuppmann
    - khaeru
    - glatterf42
    - phackstock
